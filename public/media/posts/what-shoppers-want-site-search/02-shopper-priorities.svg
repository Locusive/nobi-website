<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="1200" height="500" fill="#f8fafc"/>

  <text x="600" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e293b">What Matters Most to Online Shoppers</text>
  <text x="600" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Ranked by importance when using site search</text>

  <!-- Ranked list with visual weights -->
  <!-- #1 -->
  <rect x="60" y="90" width="1080" height="55" rx="10" fill="#0d9488"/>
  <text x="90" y="123" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#ffffff">#1</text>
  <text x="140" y="118" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Relevant Results on First Try</text>
  <text x="140" y="135" font-family="system-ui, sans-serif" font-size="11" fill="#ccfbf1">93% say this is "very important" - no scrolling through junk</text>
  <rect x="980" y="104" width="140" height="26" rx="6" fill="#ffffff" opacity="0.2"/>
  <text x="1050" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff">93%</text>

  <!-- #2 -->
  <rect x="60" y="155" width="1010" height="55" rx="10" fill="#14b8a6"/>
  <text x="90" y="188" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#ffffff">#2</text>
  <text x="140" y="183" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Speed - Results Under 1 Second</text>
  <text x="140" y="200" font-family="system-ui, sans-serif" font-size="11" fill="#ccfbf1">89% abandon after 3+ seconds of loading</text>
  <rect x="910" y="169" width="140" height="26" rx="6" fill="#ffffff" opacity="0.2"/>
  <text x="980" y="187" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff">89%</text>

  <!-- #3 -->
  <rect x="60" y="220" width="930" height="55" rx="10" fill="#2dd4bf"/>
  <text x="90" y="253" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#0f766e">#3</text>
  <text x="140" y="248" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#0f766e">Understanding My Words, Not Just Keywords</text>
  <text x="140" y="265" font-family="system-ui, sans-serif" font-size="11" fill="#115e59">82% frustrated when search requires exact product terminology</text>
  <rect x="830" y="234" width="140" height="26" rx="6" fill="#ffffff" opacity="0.3"/>
  <text x="900" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#0f766e">82%</text>

  <!-- #4 -->
  <rect x="60" y="285" width="850" height="55" rx="10" fill="#5eead4"/>
  <text x="90" y="318" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#0f766e">#4</text>
  <text x="140" y="313" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#0f766e">Product Images in Search Results</text>
  <text x="140" y="330" font-family="system-ui, sans-serif" font-size="11" fill="#115e59">78% prefer visual results over text-only listings</text>
  <rect x="750" y="299" width="140" height="26" rx="6" fill="#ffffff" opacity="0.3"/>
  <text x="820" y="317" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#0f766e">78%</text>

  <!-- #5 -->
  <rect x="60" y="350" width="760" height="55" rx="10" fill="#99f6e4"/>
  <text x="90" y="383" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#0f766e">#5</text>
  <text x="140" y="378" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#0f766e">Forgiving Typos and Misspellings</text>
  <text x="140" y="395" font-family="system-ui, sans-serif" font-size="11" fill="#115e59">71% expect search to handle mistakes automatically</text>
  <rect x="660" y="364" width="140" height="26" rx="6" fill="#ffffff" opacity="0.3"/>
  <text x="730" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#0f766e">71%</text>

  <!-- #6 -->
  <rect x="60" y="415" width="660" height="55" rx="10" fill="#ccfbf1" stroke="#5eead4" stroke-width="1"/>
  <text x="90" y="448" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#0f766e">#6</text>
  <text x="140" y="443" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#0f766e">Personalized to My Preferences</text>
  <text x="140" y="460" font-family="system-ui, sans-serif" font-size="11" fill="#115e59">64% want results that learn from browsing history</text>
  <rect x="560" y="429" width="140" height="26" rx="6" fill="#ffffff" opacity="0.5"/>
  <text x="630" y="447" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#0f766e">64%</text>

  <!-- Insight -->
  <rect x="850" y="360" width="310" height="110" rx="12" fill="#ffffff" stroke="#5eead4" stroke-width="2"/>
  <text x="1005" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0d9488">Key Takeaway</text>
  <text x="1005" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">Shoppers want Google-level</text>
  <text x="1005" y="433" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">intelligence from your search.</text>
  <text x="1005" y="458" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#0d9488">Most stores deliver 2005-era search.</text>
</svg>