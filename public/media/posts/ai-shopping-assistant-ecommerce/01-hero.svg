  <line x1="116" y1="162" x2="122" y2="168" stroke="#94a3b8" stroke-width="2"/>
  <text x="140" y="159" font-size="15" fill="#475569">"comfortable shoes for standing all day"</text>

  <!-- Intent bubbles -->
  <rect x="80" y="200" width="120" height="36" rx="18" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="140" y="223" text-anchor="middle" font-size="13" fill="#4338ca">Comfort</text>

  <rect x="215" y="200" width="120" height="36" rx="18" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="275" y="223" text-anchor="middle" font-size="13" fill="#4338ca">Support</text>

  <rect x="350" y="200" width="120" height="36" rx="18" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="410" y="223" text-anchor="middle" font-size="13" fill="#4338ca">All-Day Wear</text>

  <!-- More query examples -->
  <rect x="80" y="260" width="400" height="40" rx="8" fill="#f8fafc"/>
  <text x="100" y="285" font-size="14" fill="#64748b">"gift for mom who loves cooking"</text>

  <rect x="80" y="310" width="400" height="40" rx="8" fill="#f8fafc"/>
  <text x="100" y="335" font-size="14" fill="#64748b">"waterproof jacket under $100"</text>

  <rect x="80" y="360" width="400" height="40" rx="8" fill="#f8fafc"/>
  <text x="100" y="385" font-size="14" fill="#64748b">"something cozy for movie night"</text>

  <!-- Arrow -->
  <g transform="translate(540, 220)">
    <rect x="0" y="0" width="120" height="60" rx="30" fill="#4f46e5"/>
