<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="1200" height="500" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Feature-by-Feature Breakdown</text>

  <!-- Header -->
  <rect x="30" y="50" width="1140" height="38" rx="6" fill="#1e293b"/>
  <text x="220" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Dimension</text>
  <text x="520" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Constructor</text>
  <text x="740" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Algolia</text>
  <text x="980" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Nobi</text>

  <!-- Rows -->
  <rect x="30" y="88" width="1140" height="34" fill="#f8fafc"/>
  <text x="50" y="110" font-size="12" font-weight="600" fill="#1e293b">Semantic Search</text>
  <text x="520" y="110" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="600">Advanced</text>
  <text x="740" y="110" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="600">Advanced</text>
  <text x="980" y="110" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="600">Advanced</text>

  <rect x="30" y="122" width="1140" height="34" fill="#ffffff"/>
  <text x="50" y="144" font-size="12" font-weight="600" fill="#1e293b">Conversational AI</text>
  <text x="520" y="144" text-anchor="middle" font-size="12" fill="#dc2626">No</text>
  <text x="740" y="144" text-anchor="middle" font-size="12" fill="#dc2626">No</text>
  <text x="980" y="144" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="600">Yes</text>

  <rect x="30" y="156" width="1140" height="34" fill="#f8fafc"/>
  <text x="50" y="178" font-size="12" font-weight="600" fill="#1e293b">No-Code Setup</text>
  <text x="520" y="178" text-anchor="middle" font-size="12" fill="#dc2626">No</text>
  <text x="740" y="178" text-anchor="middle" font-size="12" fill="#dc2626">No</text>
  <text x="980" y="178" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="600">Yes</text>

  <rect x="30" y="190" width="1140" height="34" fill="#ffffff"/>
  <text x="50" y="212" font-size="12" font-weight="600" fill="#1e293b">Revenue Optimization</text>
  <text x="520" y="212" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="600">Best-in-class</text>
  <text x="740" y="212" text-anchor="middle" font-size="12" fill="#d97706">Basic</text>
  <text x="980" y="212" text-anchor="middle" font-size="12" fill="#d97706">Growing</text>

  <rect x="30" y="224" width="1140" height="34" fill="#f8fafc"/>
  <text x="50" y="246" font-size="12" font-weight="600" fill="#1e293b">Merchandising</text>
  <text x="520" y="246" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="600">Advanced</text>
  <text x="740" y="246" text-anchor="middle" font-size="12" fill="#d97706">Partial</text>
  <text x="980" y="246" text-anchor="middle" font-size="12" fill="#d97706">Basic</text>

  <rect x="30" y="258" width="1140" height="34" fill="#ffffff"/>
  <text x="50" y="280" font-size="12" font-weight="600" fill="#1e293b">Personalization</text>
  <text x="520" y="280" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="600">Deep</text>
  <text x="740" y="280" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="600">Good</text>
  <text x="980" y="280" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="600">Contextual</text>

  <rect x="30" y="292" width="1140" height="34" fill="#f8fafc"/>
  <text x="50" y="314" font-size="12" font-weight="600" fill="#1e293b">API Flexibility</text>
  <text x="520" y="314" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="600">Good</text>
  <text x="740" y="314" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="600">Best-in-class</text>
  <text x="980" y="314" text-anchor="middle" font-size="12" fill="#d97706">Standard</text>

  <rect x="30" y="326" width="1140" height="34" fill="#ffffff"/>
  <text x="50" y="348" font-size="12" font-weight="600" fill="#1e293b">Shopify Integration</text>
  <text x="520" y="348" text-anchor="middle" font-size="12" fill="#dc2626">No native</text>
  <text x="740" y="348" text-anchor="middle" font-size="12" fill="#d97706">Plugin</text>
  <text x="980" y="348" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="600">Native</text>

  <rect x="30" y="360" width="1140" height="34" fill="#f8fafc"/>
  <text x="50" y="382" font-size="12" font-weight="600" fill="#1e293b">Pricing Transparency</text>
  <text x="520" y="382" text-anchor="middle" font-size="12" fill="#dc2626">Custom quotes</text>
  <text x="740" y="382" text-anchor="middle" font-size="12" fill="#d97706">Published + overages</text>
  <text x="980" y="382" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="600">Transparent</text>

  <rect x="30" y="394" width="1140" height="34" fill="#ffffff"/>
  <text x="50" y="416" font-size="12" font-weight="600" fill="#1e293b">Implementation Time</text>
  <text x="520" y="416" text-anchor="middle" font-size="12" fill="#dc2626">Weeks-months</text>
  <text x="740" y="416" text-anchor="middle" font-size="12" fill="#d97706">Days-weeks</text>
  <text x="980" y="416" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="600">Minutes</text>

  <rect x="30" y="428" width="1140" height="34" fill="#f8fafc"/>
  <text x="50" y="450" font-size="12" font-weight="600" fill="#1e293b">Best For</text>
  <text x="520" y="450" text-anchor="middle" font-size="12" fill="#1e293b">Enterprise retailers</text>
  <text x="740" y="450" text-anchor="middle" font-size="12" fill="#1e293b">Dev-heavy teams</text>
  <text x="980" y="450" text-anchor="middle" font-size="12" fill="#1e293b">Ecomm teams, DTC</text>

  <!-- Vertical dividers -->
  <line x1="410" y1="50" x2="410" y2="462" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="630" y1="50" x2="630" y2="462" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="860" y1="50" x2="860" y2="462" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Bottom note -->
  <rect x="200" y="470" width="800" height="28" rx="6" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1"/>
  <text x="600" y="489" text-anchor="middle" font-size="12" fill="#0369a1" font-weight="600">No single tool wins everywhere. The right choice depends on your team, budget, and goals.</text>
</svg>