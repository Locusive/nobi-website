<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="1200" height="500" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Ecommerce Site Search Benchmarks — 2026</text>

  <!-- Dashboard layout: 3 sections -->

  <!-- Section 1: Conversion rates bar chart -->
  <rect x="30" y="55" width="370" height="420" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="215" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Conversion by Search Type</text>

  <!-- Bars -->
  <text x="55" y="120" font-size="11" fill="#64748b">No search used</text>
  <rect x="170" y="108" width="80" height="20" rx="4" fill="#cbd5e1"/>
  <text x="258" y="123" font-size="11" fill="#64748b">1.8%</text>

  <text x="55" y="160" font-size="11" fill="#64748b">Keyword search</text>
  <rect x="170" y="148" width="140" height="20" rx="4" fill="#fbbf24"/>
  <text x="318" y="163" font-size="11" fill="#64748b">3.2%</text>

  <text x="55" y="200" font-size="11" fill="#64748b">Semantic search</text>
  <rect x="170" y="188" width="190" height="20" rx="4" fill="#f59e0b"/>
  <text x="368" y="203" font-size="11" fill="#64748b">4.5%</text>

  <text x="55" y="240" font-size="11" fill="#64748b">Conversational AI</text>
  <rect x="170" y="228" width="220" height="20" rx="4" fill="#0f172a"/>
  <text x="398" y="243" font-size="11" fill="#64748b">5.8%</text>

  <!-- Section 1b: Zero-result rates -->
  <text x="215" y="290" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Zero-Result Rates</text>

  <text x="55" y="325" font-size="11" fill="#64748b">Average ecomm site</text>
  <rect x="170" y="313" width="180" height="20" rx="4" fill="#fca5a5"/>
  <text x="358" y="328" font-size="11" fill="#dc2626" font-weight="600">15%</text>

  <text x="55" y="365" font-size="11" fill="#64748b">Optimized keyword</text>
  <rect x="170" y="353" width="100" height="20" rx="4" fill="#fde68a"/>
  <text x="278" y="368" font-size="11" fill="#d97706" font-weight="600">8%</text>

  <text x="55" y="405" font-size="11" fill="#64748b">AI-powered search</text>
  <rect x="170" y="393" width="40" height="20" rx="4" fill="#86efac"/>
  <text x="218" y="408" font-size="11" fill="#16a34a" font-weight="600">3%</text>

  <text x="55" y="445" font-size="11" fill="#64748b">Conversational AI</text>
  <rect x="170" y="433" width="15" height="20" rx="4" fill="#22c55e"/>
  <text x="193" y="448" font-size="11" fill="#16a34a" font-weight="600">&lt;1%</text>

  <!-- Section 2: Mobile vs Desktop -->
  <rect x="420" y="55" width="370" height="200" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="605" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Mobile vs Desktop Search</text>

  <!-- Mobile circle -->
  <circle cx="520" cy="165" r="55" fill="#fef3c7" stroke="#fbbf24" stroke-width="2.5"/>
  <text x="520" y="160" text-anchor="middle" font-size="22" font-weight="800" fill="#0f172a">68%</text>
  <text x="520" y="180" text-anchor="middle" font-size="11" fill="#64748b">Mobile</text>

  <!-- Desktop circle -->
  <circle cx="680" cy="165" r="40" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="680" y="162" text-anchor="middle" font-size="18" font-weight="800" fill="#0f172a">32%</text>
  <text x="680" y="180" text-anchor="middle" font-size="10" fill="#64748b">Desktop</text>

  <!-- Section 3: AI Adoption -->
  <rect x="420" y="270" width="370" height="205" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="605" y="297" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">AI Search Adoption (2026)</text>

  <!-- Progress bars -->
  <text x="445" y="330" font-size="11" fill="#64748b">Basic keyword</text>
  <rect x="445" y="338" width="320" height="14" rx="4" fill="#f1f5f9"/>
  <rect x="445" y="338" width="160" height="14" rx="4" fill="#94a3b8"/>
  <text x="615" y="349" font-size="10" fill="#64748b">48%</text>

  <text x="445" y="375" font-size="11" fill="#64748b">Semantic / AI</text>
  <rect x="445" y="383" width="320" height="14" rx="4" fill="#f1f5f9"/>
  <rect x="445" y="383" width="112" height="14" rx="4" fill="#fbbf24"/>
  <text x="567" y="394" font-size="10" fill="#64748b">34%</text>

  <text x="445" y="420" font-size="11" fill="#64748b">Conversational AI</text>
  <rect x="445" y="428" width="320" height="14" rx="4" fill="#f1f5f9"/>
  <rect x="445" y="428" width="38" height="14" rx="4" fill="#0f172a"/>
  <text x="493" y="439" font-size="10" fill="#64748b">12%</text>

  <text x="445" y="462" font-size="10" fill="#94a3b8">Conversational AI is the fastest-growing segment (+180% YoY)</text>

  <!-- Section 4: Revenue impact -->
  <rect x="810" y="55" width="360" height="420" rx="12" fill="#0f172a"/>
  <text x="990" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#fbbf24">Revenue Impact</text>

  <!-- Big numbers -->
  <text x="990" y="140" text-anchor="middle" font-size="14" fill="#94a3b8">Search users are just</text>
  <text x="990" y="185" text-anchor="middle" font-size="52" font-weight="800" fill="#fbbf24">15%</text>
  <text x="990" y="210" text-anchor="middle" font-size="14" fill="#94a3b8">of total traffic</text>

  <text x="990" y="250" text-anchor="middle" font-size="14" fill="#94a3b8">but generate</text>
  <text x="990" y="295" text-anchor="middle" font-size="52" font-weight="800" fill="#fbbf24">45%</text>
  <text x="990" y="320" text-anchor="middle" font-size="14" fill="#94a3b8">of total revenue</text>

  <line x1="870" y1="345" x2="1110" y2="345" stroke="#334155" stroke-width="1"/>

  <text x="990" y="380" text-anchor="middle" font-size="13" fill="#94a3b8">Average order value for</text>
  <text x="990" y="400" text-anchor="middle" font-size="13" fill="#94a3b8">search users is</text>
  <text x="990" y="440" text-anchor="middle" font-size="36" font-weight="800" fill="#fbbf24">2.6x</text>
  <text x="990" y="465" text-anchor="middle" font-size="13" fill="#94a3b8">higher than browsers</text>
</svg>