  <text x="435" y="362" font-family="system-ui, sans-serif" font-size="11" fill="#ea580c">$139.95</text>
  <text x="435" y="378" font-family="system-ui, sans-serif" font-size="10" fill="#f59e0b">&#9733;&#9733;&#9733;&#9733;&#9733; (4,102)</text>
  <text x="435" y="395" font-family="system-ui, sans-serif" font-size="9" fill="#16a34a">Stability support</text>
  <text x="435" y="413" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">FREE delivery Thu</text>
  <rect x="615" y="215" width="175" height="220" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="630" y="225" width="145" height="100" rx="4" fill="#f1f5f9"/>
  <text x="702" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Product Image</text>
  <text x="630" y="345" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#0f172a">New Balance 860v14</text>
  <text x="630" y="362" font-family="system-ui, sans-serif" font-size="11" fill="#ea580c">$129.99</text>
  <text x="630" y="378" font-family="system-ui, sans-serif" font-size="10" fill="#f59e0b">&#9733;&#9733;&#9733;&#9733;&#9734; (1,523)</text>
  <text x="630" y="395" font-family="system-ui, sans-serif" font-size="9" fill="#16a34a">Motion control</text>
  <text x="630" y="413" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">FREE delivery Fri</text>
  <rect x="810" y="215" width="175" height="220" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="825" y="225" width="145" height="100" rx="4" fill="#f1f5f9"/>
  <text x="897" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Product Image</text>
  <text x="825" y="345" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#0f172a">Saucony Guide 17</text>
  <text x="825" y="362" font-family="system-ui, sans-serif" font-size="11" fill="#ea580c">$119.95</text>
  <text x="825" y="378" font-family="system-ui, sans-serif" font-size="10" fill="#f59e0b">&#9733;&#9733;&#9733;&#9733;&#9734; (987)</text>
  <text x="825" y="395" font-family="system-ui, sans-serif" font-size="9" fill="#16a34a">Arch support</text>
  <text x="825" y="413" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">FREE delivery Fri</text>
  <!-- Bottom callouts -->
  <line x1="310" y1="450" x2="310" y2="475" stroke="#fdba74" stroke-width="2"/>
  <text x="310" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#c2410c">Visual Results</text>
  <line x1="600" y1="450" x2="600" y2="475" stroke="#fdba74" stroke-width="2"/>
  <text x="600" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#c2410c">"Did You Mean" Corrections</text>
  <line x1="890" y1="450" x2="890" y2="475" stroke="#fdba74" stroke-width="2"/>
  <text x="890" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#c2410c">Related Products</text>
</svg>