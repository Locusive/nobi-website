<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="blueBg" x1="0" y1="0" x2="1200" y2="500">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#blueBg)"/>
  <!-- Timeline line -->
  <line x1="100" y1="300" x2="1100" y2="300" stroke="#bfdbfe" stroke-width="4" stroke-linecap="round"/>
  <!-- Era 1: Keyword Search -->
  <circle cx="160" cy="300" r="28" fill="#ffffff" stroke="#93c5fd" stroke-width="3"/>
  <rect x="148" y="284" width="24" height="3" rx="1.5" fill="#3b82f6"/>
  <rect x="148" y="291" width="24" height="3" rx="1.5" fill="#93c5fd"/>
  <rect x="148" y="298" width="24" height="3" rx="1.5" fill="#3b82f6"/>
  <rect x="148" y="305" width="18" height="3" rx="1.5" fill="#93c5fd"/>
  <text x="160" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e3a5f">Keyword</text>
  <text x="160" y="378" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e3a5f">Search</text>
  <text x="160" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">2000s</text>
  <rect x="100" y="170" width="120" height="80" rx="10" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="160" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Type exact words</text>
  <text x="160" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Boolean matching</text>
  <text x="160" y="236" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Basic results list</text>
  <line x1="160" y1="250" x2="160" y2="272" stroke="#bfdbfe" stroke-width="2"/>
  <!-- Era 2: Faceted Navigation -->
  <circle cx="380" cy="300" r="28" fill="#ffffff" stroke="#93c5fd" stroke-width="3"/>
  <rect x="366" y="284" width="28" height="32" rx="4" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <line x1="370" y1="293" x2="390" y2="293" stroke="#93c5fd" stroke-width="2"/>
  <line x1="370" y1="300" x2="390" y2="300" stroke="#93c5fd" stroke-width="2"/>
  <line x1="370" y1="307" x2="385" y2="307" stroke="#93c5fd" stroke-width="2"/>
  <text x="380" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e3a5f">Faceted</text>
  <text x="380" y="378" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e3a5f">Navigation</text>
  <text x="380" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">2008-2015</text>
  <rect x="320" y="170" width="120" height="80" rx="10" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="380" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Filters and facets</text>
  <text x="380" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Category drilling</text>
  <text x="380" y="236" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Refinement options</text>
  <line x1="380" y1="250" x2="380" y2="272" stroke="#bfdbfe" stroke-width="2"/>
  <!-- Era 3: Personalized Results -->
  <circle cx="600" cy="300" r="28" fill="#ffffff" stroke="#6366f1" stroke-width="3"/>
  <circle cx="600" cy="295" r="8" fill="none" stroke="#6366f1" stroke-width="2"/>
  <path d="M588 310 a12 8 0 0 1 24 0" fill="none" stroke="#6366f1" stroke-width="2"/>
  <text x="600" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e3a5f">Personalized</text>
  <text x="600" y="378" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e3a5f">Results</text>
  <text x="600" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">2015-2022</text>
  <rect x="540" y="170" width="120" height="80" rx="10" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="600" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">User behavior data</text>
  <text x="600" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Collaborative filtering</text>
  <text x="600" y="236" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Ranked by relevance</text>
  <line x1="600" y1="250" x2="600" y2="272" stroke="#c7d2fe" stroke-width="2"/>
  <!-- Era 4: Conversational AI -->
  <circle cx="820" cy="300" r="28" fill="#ffffff" stroke="#8b5cf6" stroke-width="3"/>
  <path d="M808 290h24v16a4 4 0 01-4 4h-16a4 4 0 01-4-4v-16z" fill="none" stroke="#8b5cf6" stroke-width="2" rx="4"/>
  <path d="M812 314l-4 6" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
  <circle cx="814" cy="299" r="1.5" fill="#8b5cf6"/>
  <circle cx="820" cy="299" r="1.5" fill="#8b5cf6"/>
  <circle cx="826" cy="299" r="1.5" fill="#8b5cf6"/>
  <text x="820" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e3a5f">Conversational</text>
  <text x="820" y="378" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e3a5f">AI</text>
  <text x="820" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">2023-2025</text>
  <rect x="760" y="170" width="120" height="80" rx="10" fill="#ffffff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="820" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">LLM-powered</text>
  <text x="820" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Natural language</text>
  <text x="820" y="236" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Intent understanding</text>
  <line x1="820" y1="250" x2="820" y2="272" stroke="#ddd6fe" stroke-width="2"/>
  <!-- Era 5: Shopping Assistants (current) -->
  <circle cx="1040" cy="300" r="32" fill="#3b82f6" stroke="#1d4ed8" stroke-width="3"/>
  <path d="M1028 294h24M1028 300h24M1028 306h18" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <circle cx="1052" cy="288" r="5" fill="#fbbf24"/>
  <text x="1040" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e3a5f">Shopping</text>
  <text x="1040" y="378" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e3a5f">Assistants</text>
  <text x="1040" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#3b82f6">2026+</text>
  <rect x="980" y="140" width="120" height="100" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="1040" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1d4ed8">Full context</text>
  <text x="1040" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3b82f6">Multi-turn dialogue</text>
  <text x="1040" y="204" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3b82f6">Product expertise</text>
  <text x="1040" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3b82f6">Proactive guidance</text>
  <line x1="1040" y1="240" x2="1040" y2="268" stroke="#3b82f6" stroke-width="2"/>
  <!-- Arrows between nodes -->
  <path d="M192 300 L348 300" stroke="#93c5fd" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <path d="M412 300 L568 300" stroke="#93c5fd" stroke-width="2"/>
  <path d="M632 300 L788 300" stroke="#a78bfa" stroke-width="2"/>
  <path d="M852 300 L1004 300" stroke="#6366f1" stroke-width="2"/>
  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="800" fill="#0f172a">The Evolution of Ecommerce Search</text>
  <text x="600" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#64748b">From keyword boxes to intelligent shopping assistants</text>
  <!-- Arrow for current era -->
  <text x="1040" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#3b82f6">WE ARE HERE</text>
  <path d="M1040 425 L1040 420" stroke="#3b82f6" stroke-width="2"/>
</svg>