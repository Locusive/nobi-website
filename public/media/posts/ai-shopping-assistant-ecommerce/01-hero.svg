    <text x="20" y="44" font-size="11" fill="#c7d2fe">Understands</text>
    <path d="M95 30 L115 30 M108 23 L115 30 L108 37" stroke="#ffffff" stroke-width="2" fill="none"/>
  </g>

  <!-- Right side: AI results -->
  <rect x="680" y="60" width="480" height="380" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="920" y="100" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">What AI Returns</text>

  <!-- Product cards -->
  <rect x="720" y="125" width="180" height="140" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="740" y="140" width="140" height="70" rx="8" fill="#eef2ff"/>
  <text x="810" y="180" text-anchor="middle" font-size="22" fill="#4f46e5">&#128095;</text>
  <text x="810" y="230" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Cloud Walker Pro</text>
  <text x="810" y="248" text-anchor="middle" font-size="11" fill="#22c55e">98% match</text>

  <rect x="920" y="125" width="180" height="140" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="940" y="140" width="140" height="70" rx="8" fill="#eef2ff"/>
  <text x="1010" y="180" text-anchor="middle" font-size="22" fill="#4f46e5">&#128094;</text>
  <text x="1010" y="230" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">ErgoPad Slip-On</text>
  <text x="1010" y="248" text-anchor="middle" font-size="11" fill="#22c55e">95% match</text>

  <rect x="720" y="280" width="180" height="140" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="740" y="295" width="140" height="70" rx="8" fill="#eef2ff"/>
  <text x="810" y="335" text-anchor="middle" font-size="22" fill="#4f46e5">&#129406;</text>
  <text x="810" y="385" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">StandAll Comfort</text>
  <text x="810" y="403" text-anchor="middle" font-size="11" fill="#22c55e">93% match</text>

  <rect x="920" y="280" width="180" height="140" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="940" y="295" width="140" height="70" rx="8" fill="#eef2ff"/>
  <text x="1010" y="335" text-anchor="middle" font-size="22" fill="#4f46e5">&#128096;</text>
  <text x="1010" y="385" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">DayLong Sneaker</text>
  <text x="1010" y="403" text-anchor="middle" font-size="11" fill="#22c55e">91% match</text>

  <!-- Bottom label -->
  <text x="600" y="478" text-anchor="middle" font-size="14" fill="#94a3b8">AI Shopping Assistant: From natural language to perfect product matches</text>
