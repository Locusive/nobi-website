<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="1200" height="500" fill="#ffffff"/>
  <text x="600" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="#0f172a">Site Search Conversion Rate Benchmarks</text>
  <text x="600" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Where does your store stand?</text>
  <!-- Gauge/meter -->
  <g transform="translate(600, 320)">
    <!-- Gauge background arc -->
    <path d="M-220 0 A220 220 0 0 1 220 0" fill="none" stroke="#f1f5f9" stroke-width="40" stroke-linecap="round"/>
    <!-- Poor range (red) -->
    <path d="M-220 0 A220 220 0 0 1 -170 -138" fill="none" stroke="#fca5a5" stroke-width="40" stroke-linecap="round"/>
    <!-- Below average (orange) -->
    <path d="M-165 -142 A220 220 0 0 1 -60 -212" fill="none" stroke="#fdba74" stroke-width="40" stroke-linecap="round"/>
    <!-- Average (yellow) -->
    <path d="M-54 -213 A220 220 0 0 1 80 -205" fill="none" stroke="#fcd34d" stroke-width="40" stroke-linecap="round"/>
    <!-- Good (teal) -->
    <path d="M86 -203 A220 220 0 0 1 175 -133" fill="none" stroke="#5eead4" stroke-width="40" stroke-linecap="round"/>
    <!-- Excellent (green) -->
    <path d="M180 -127 A220 220 0 0 1 220 0" fill="none" stroke="#34d399" stroke-width="40" stroke-linecap="round"/>
    <!-- Labels -->
    <text x="-240" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ef4444">1%</text>
    <text x="-190" y="-130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#f97316">2%</text>
    <text x="-50" y="-225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#eab308">3.5%</text>
    <text x="100" y="-220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#14b8a6">5%</text>
    <text x="200" y="-125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#10b981">7%</text>
    <text x="240" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#10b981">10%+</text>
    <!-- Needle pointing to average -->
    <line x1="0" y1="0" x2="10" y2="-180" stroke="#0f172a" stroke-width="4" stroke-linecap="round" transform="rotate(-15)"/>
    <circle cx="0" cy="0" r="12" fill="#0f172a"/>
    <circle cx="0" cy="0" r="6" fill="#ffffff"/>
    <!-- Center label -->
    <text x="0" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" font-weight="800" fill="#0f172a">4.3%</text>
    <text x="0" y="75" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Average Search CVR</text>
  </g>
  <!-- Range labels -->
  <rect x="80" y="420" width="16" height="16" rx="3" fill="#fca5a5"/>
  <text x="102" y="433" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Poor (&lt;2%)</text>
  <rect x="220" y="420" width="16" height="16" rx="3" fill="#fdba74"/>
  <text x="242" y="433" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Below Avg (2-3%)</text>
  <rect x="400" y="420" width="16" height="16" rx="3" fill="#fcd34d"/>
  <text x="422" y="433" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Average (3-5%)</text>
  <rect x="580" y="420" width="16" height="16" rx="3" fill="#5eead4"/>
  <text x="602" y="433" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Good (5-7%)</text>
  <rect x="740" y="420" width="16" height="16" rx="3" fill="#34d399"/>
  <text x="762" y="433" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Excellent (7%+)</text>
  <!-- Side stats -->
  <rect x="80" y="110" width="200" height="100" rx="12" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="180" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#0d9488">2-3x</text>
  <text x="180" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#0f766e">Higher CVR vs browsers</text>
  <text x="180" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#5eead4">Search users convert more</text>
  <rect x="920" y="110" width="200" height="100" rx="12" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="1020" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#0d9488">45%</text>
  <text x="1020" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#0f766e">Revenue from 15% traffic</text>
  <text x="1020" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#5eead4">Search punches above weight</text>
</svg>