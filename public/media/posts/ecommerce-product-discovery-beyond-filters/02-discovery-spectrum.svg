<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="1200" height="500" fill="#f8fafc"/>

  <text x="600" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e293b">The Product Discovery Spectrum</text>
  <text x="600" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Different shopping modes need different tools</text>

  <!-- Spectrum bar -->
  <defs>
    <linearGradient id="spectrumGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>
  <rect x="100" y="110" width="1000" height="12" rx="6" fill="url(#spectrumGrad)"/>

  <!-- Left label -->
  <text x="100" y="100" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#7c3aed">"I know exactly what I want"</text>
  <!-- Right label -->
  <text x="1100" y="100" text-anchor="end" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#7c3aed">"Help me figure it out"</text>

  <!-- Position 1: SKU lookup -->
  <line x1="180" y1="122" x2="180" y2="155" stroke="#7c3aed" stroke-width="2"/>
  <rect x="80" y="155" width="200" height="140" rx="10" fill="#ffffff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="180" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">SKU / Model Lookup</text>
  <text x="180" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">"Nike Air Max 90 white"</text>
  <text x="180" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">"iPhone 15 Pro 256GB"</text>
  <rect x="110" y="245" width="140" height="28" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="180" y="264" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#16a34a">Filters work great</text>

  <!-- Position 2: Category browsing -->
  <line x1="420" y1="122" x2="420" y2="155" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="320" y="155" width="200" height="140" rx="10" fill="#ffffff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="420" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Category Browse</text>
  <text x="420" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">"running shoes under $150"</text>
  <text x="420" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">"blue casual shirts"</text>
  <rect x="350" y="245" width="140" height="28" rx="6" fill="#fefce8" stroke="#fde047" stroke-width="1"/>
  <text x="420" y="264" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#a16207">Filters kinda work</text>

  <!-- Position 3: Occasion shopping -->
  <line x1="660" y1="122" x2="660" y2="155" stroke="#a78bfa" stroke-width="2"/>
  <rect x="560" y="155" width="200" height="140" rx="10" fill="#ffffff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="660" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Occasion Shopping</text>
  <text x="660" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">"outfit for job interview"</text>
  <text x="660" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">"gift for wine lover"</text>
  <rect x="590" y="245" width="140" height="28" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="660" y="264" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#c2410c">Filters fail here</text>

  <!-- Position 4: Exploratory -->
  <line x1="900" y1="122" x2="900" y2="155" stroke="#c4b5fd" stroke-width="2"/>
  <rect x="800" y="155" width="200" height="140" rx="10" fill="#ffffff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="900" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Exploratory / Vague</text>
  <text x="900" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">"something cozy for fall"</text>
  <text x="900" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">"redecorate my living room"</text>
  <rect x="830" y="245" width="140" height="28" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="900" y="264" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#dc2626">Filters are useless</text>

  <!-- Bottom insight boxes -->
  <rect x="100" y="330" width="480" height="140" rx="12" fill="#ffffff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="340" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b">The Discovery Gap</text>
  <text x="340" y="392" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#475569">Most ecommerce sites only serve the left side</text>
  <text x="340" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#475569">of this spectrum. But 60-70% of shoppers are</text>
  <text x="340" y="432" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#475569">browsing on the right side, exploring and discovering.</text>
  <text x="340" y="458" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#7c3aed">That's your biggest missed opportunity.</text>

  <rect x="620" y="330" width="480" height="140" rx="12" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="860" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b">The AI Solution</text>
  <text x="860" y="392" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#475569">Conversational AI search covers the entire</text>
  <text x="860" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#475569">spectrum. It handles precise lookups AND</text>
  <text x="860" y="432" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#475569">vague exploration with equal confidence.</text>
  <text x="860" y="458" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#7c3aed">One tool. Every shopping mode.</text>
</svg>