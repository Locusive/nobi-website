<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="1200" height="500" fill="#f8fafc"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Three Approaches to AI Search</text>
  <text x="600" y="70" text-anchor="middle" font-size="14" fill="#64748b">Different tools for different teams. Which fits yours?</text>

  <!-- Three equal columns -->
  <!-- Constructor -->
  <rect x="50" y="95" width="340" height="380" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="50" y="95" width="340" height="60" rx="16" fill="#0f172a"/>
  <rect x="50" y="140" width="340" height="15" fill="#0f172a"/>
  <text x="220" y="133" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">Constructor</text>
  <text x="220" y="185" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Enterprise Revenue Optimization</text>

  <text x="80" y="215" font-size="13" fill="#64748b">Target: $50M+ GMV retailers</text>
  <text x="80" y="240" font-size="13" fill="#64748b">Pricing: $50K+/year</text>
  <text x="80" y="265" font-size="13" fill="#64748b">Setup: Weeks to months</text>

  <line x1="80" y1="285" x2="360" y2="285" stroke="#e2e8f0" stroke-width="1"/>

  <text x="80" y="310" font-size="12" font-weight="600" fill="#1e293b">Strengths</text>
  <text x="80" y="330" font-size="12" fill="#64748b">+ ML revenue optimization</text>
  <text x="80" y="348" font-size="12" fill="#64748b">+ Deep personalization</text>
  <text x="80" y="366" font-size="12" fill="#64748b">+ Quizzes and collections</text>

  <text x="80" y="396" font-size="12" font-weight="600" fill="#1e293b">Trade-offs</text>
  <text x="80" y="416" font-size="12" fill="#64748b">- Enterprise pricing only</text>
  <text x="80" y="434" font-size="12" fill="#64748b">- Long implementation</text>
  <text x="80" y="452" font-size="12" fill="#64748b">- Not for SMBs</text>

  <!-- Algolia -->
  <rect x="430" y="95" width="340" height="380" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="430" y="95" width="340" height="60" rx="16" fill="#5468ff"/>
  <rect x="430" y="140" width="340" height="15" fill="#5468ff"/>
  <text x="600" y="133" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">Algolia</text>
  <text x="600" y="185" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Developer-First Search API</text>

  <text x="460" y="215" font-size="13" fill="#64748b">Target: Dev-heavy teams</text>
  <text x="460" y="240" font-size="13" fill="#64748b">Pricing: Usage-based</text>
  <text x="460" y="265" font-size="13" fill="#64748b">Setup: Days to weeks (with devs)</text>

  <line x1="460" y1="285" x2="740" y2="285" stroke="#e2e8f0" stroke-width="1"/>

  <text x="460" y="310" font-size="12" font-weight="600" fill="#1e293b">Strengths</text>
  <text x="460" y="330" font-size="12" fill="#64748b">+ Powerful API</text>
  <text x="460" y="348" font-size="12" fill="#64748b">+ Blazing fast indexing</text>
  <text x="460" y="366" font-size="12" fill="#64748b">+ Huge ecosystem</text>

  <text x="460" y="396" font-size="12" font-weight="600" fill="#1e293b">Trade-offs</text>
  <text x="460" y="416" font-size="12" fill="#64748b">- Requires developers</text>
  <text x="460" y="434" font-size="12" fill="#64748b">- Pricing can spike</text>
  <text x="460" y="452" font-size="12" fill="#64748b">- Complex configuration</text>

  <!-- Nobi -->
  <rect x="810" y="95" width="340" height="380" rx="16" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  <rect x="810" y="95" width="340" height="60" rx="16" fill="#2563eb"/>
  <rect x="810" y="140" width="340" height="15" fill="#2563eb"/>
  <text x="980" y="133" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">Nobi</text>
  <text x="980" y="185" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Conversational AI for Ecommerce</text>

  <text x="840" y="215" font-size="13" fill="#64748b">Target: Ecommerce teams, DTC</text>
  <text x="840" y="240" font-size="13" fill="#64748b">Pricing: Accessible, transparent</text>
  <text x="840" y="265" font-size="13" fill="#64748b">Setup: Minutes, no code</text>

  <line x1="840" y1="285" x2="1120" y2="285" stroke="#e2e8f0" stroke-width="1"/>

  <text x="840" y="310" font-size="12" font-weight="600" fill="#1e293b">Strengths</text>
  <text x="840" y="330" font-size="12" fill="#64748b">+ Conversational product discovery</text>
  <text x="840" y="348" font-size="12" fill="#64748b">+ No developers needed</text>
  <text x="840" y="366" font-size="12" fill="#64748b">+ Predictable pricing</text>

  <text x="840" y="396" font-size="12" font-weight="600" fill="#1e293b">Trade-offs</text>
  <text x="840" y="416" font-size="12" fill="#64748b">- Newer platform</text>
  <text x="840" y="434" font-size="12" fill="#64748b">- Growing feature set</text>
  <text x="840" y="452" font-size="12" fill="#64748b">- Less enterprise tooling</text>
</svg>