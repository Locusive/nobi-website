<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="1200" height="500" fill="#f8fafc"/>

  <text x="600" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Search CRO Optimization Scorecard</text>
  <text x="600" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Rate your store on each optimization (0-10 scale)</text>

  <!-- Header row -->
  <rect x="40" y="85" width="1120" height="40" rx="8" fill="#15803d"/>
  <text x="60" y="110" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Optimization</text>
  <text x="500" y="110" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">What to Check</text>
  <text x="900" y="110" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Expected Lift</text>
  <text x="1060" y="110" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Priority</text>

  <!-- Row 1 -->
  <rect x="40" y="130" width="1120" height="48" rx="0" fill="#ffffff"/>
  <circle cx="68" cy="154" r="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="68" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#16a34a">1</text>
  <text x="90" y="158" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Relevance Tuning</text>
  <text x="500" y="150" font-family="system-ui, sans-serif" font-size="12" fill="#475569">Do top 3 results match user intent?</text>
  <text x="500" y="166" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Test with 20 common queries</text>
  <rect x="900" y="142" width="80" height="24" rx="6" fill="#dcfce7"/>
  <text x="940" y="159" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#16a34a">+40-80%</text>
  <rect x="1040" y="142" width="80" height="24" rx="6" fill="#fef2f2"/>
  <text x="1080" y="159" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#dc2626">Critical</text>

  <!-- Row 2 -->
  <rect x="40" y="182" width="1120" height="48" rx="0" fill="#f8fafc"/>
  <circle cx="68" cy="206" r="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="68" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#16a34a">2</text>
  <text x="90" y="210" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Zero-Result Elimination</text>
  <text x="500" y="202" font-family="system-ui, sans-serif" font-size="12" fill="#475569">What % of searches return 0 results?</text>
  <text x="500" y="218" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Target: less than 5%</text>
  <rect x="900" y="194" width="80" height="24" rx="6" fill="#dcfce7"/>
  <text x="940" y="211" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#16a34a">+30-60%</text>
  <rect x="1040" y="194" width="80" height="24" rx="6" fill="#fef2f2"/>
  <text x="1080" y="211" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#dc2626">Critical</text>

  <!-- Row 3 -->
  <rect x="40" y="234" width="1120" height="48" rx="0" fill="#ffffff"/>
  <circle cx="68" cy="258" r="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="68" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#16a34a">3</text>
  <text x="90" y="262" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Synonym Management</text>
  <text x="500" y="254" font-family="system-ui, sans-serif" font-size="12" fill="#475569">Can users find products with different terms?</text>
  <text x="500" y="270" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">couch/sofa, sneakers/trainers</text>
  <rect x="900" y="246" width="80" height="24" rx="6" fill="#dcfce7"/>
  <text x="940" y="263" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#16a34a">+25-50%</text>
  <rect x="1040" y="246" width="80" height="24" rx="6" fill="#fff7ed"/>
  <text x="1080" y="263" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ea580c">High</text>

  <!-- Row 4 -->
  <rect x="40" y="286" width="1120" height="48" rx="0" fill="#f8fafc"/>
  <circle cx="68" cy="310" r="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="68" y="314" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#16a34a">4</text>
  <text x="90" y="314" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Mobile Search UX</text>
  <text x="500" y="306" font-family="system-ui, sans-serif" font-size="12" fill="#475569">Is search prominent and easy on mobile?</text>
  <text x="500" y="322" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Full-screen overlay, large tap targets</text>
  <rect x="900" y="298" width="80" height="24" rx="6" fill="#dcfce7"/>
  <text x="940" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#16a34a">+45-90%</text>
  <rect x="1040" y="298" width="80" height="24" rx="6" fill="#fff7ed"/>
  <text x="1080" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ea580c">High</text>

  <!-- Row 5 -->
  <rect x="40" y="338" width="1120" height="48" rx="0" fill="#ffffff"/>
  <circle cx="68" cy="362" r="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="68" y="366" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#16a34a">5</text>
  <text x="90" y="366" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Search Suggestions</text>
  <text x="500" y="358" font-family="system-ui, sans-serif" font-size="12" fill="#475569">Autocomplete with product previews?</text>
  <text x="500" y="374" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Images, prices, ratings in dropdown</text>
  <rect x="900" y="350" width="80" height="24" rx="6" fill="#dcfce7"/>
  <text x="940" y="367" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#16a34a">+20-40%</text>
  <rect x="1040" y="350" width="80" height="24" rx="6" fill="#fefce8"/>
  <text x="1080" y="367" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#a16207">Medium</text>

  <!-- Row 6 -->
  <rect x="40" y="390" width="1120" height="48" rx="0" fill="#f8fafc"/>
  <circle cx="68" cy="414" r="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="68" y="418" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#16a34a">6</text>
  <text x="90" y="418" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Visual Search Results</text>
  <text x="500" y="410" font-family="system-ui, sans-serif" font-size="12" fill="#475569">Product images, prices shown in results?</text>
  <text x="500" y="426" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Rich cards vs plain text links</text>
  <rect x="900" y="402" width="80" height="24" rx="6" fill="#dcfce7"/>
  <text x="940" y="419" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#16a34a">+50-100%</text>
  <rect x="1040" y="402" width="80" height="24" rx="6" fill="#fff7ed"/>
  <text x="1080" y="419" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ea580c">High</text>

  <!-- Row 7 -->
  <rect x="40" y="442" width="1120" height="48" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <circle cx="68" cy="466" r="12" fill="#16a34a"/>
  <text x="68" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff">7</text>
  <text x="90" y="470" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#15803d">AI-Powered Search (all-in-one)</text>
  <text x="500" y="462" font-family="system-ui, sans-serif" font-size="12" fill="#475569">Handles all 6 above automatically</text>
  <text x="500" y="478" font-family="system-ui, sans-serif" font-size="11" fill="#16a34a">One integration, maximum impact</text>
  <rect x="900" y="454" width="80" height="24" rx="6" fill="#15803d"/>
  <text x="940" y="471" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">+200%+</text>
  <rect x="1040" y="454" width="80" height="24" rx="6" fill="#15803d"/>
  <text x="1080" y="471" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Best ROI</text>
</svg>