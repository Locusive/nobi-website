<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="1200" height="500" fill="#f8fafc"/>
  <text x="600" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#0f172a">7 Lessons From Amazon's Search</text>
  <text x="600" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Difficulty: how hard to implement without AI</text>
  <!-- Row 1 -->
  <!-- Card 1: Synonym Handling -->
  <rect x="40" y="85" width="330" height="115" rx="12" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5"/>
  <rect x="40" y="85" width="330" height="6" rx="3" fill="#ea580c"/>
  <circle cx="70" cy="120" r="18" fill="#fff7ed"/>
  <text x="70" y="126" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#ea580c">1</text>
  <text x="100" y="118" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0f172a">Synonym Handling</text>
  <text x="100" y="136" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">"sneakers" = "tennis shoes" = "trainers"</text>
  <rect x="100" y="152" width="60" height="20" rx="4" fill="#fef3c7"/>
  <text x="130" y="166" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">Medium</text>
  <text x="168" y="166" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Manual rules or AI</text>
  <!-- Card 2: Intent Understanding -->
  <rect x="390" y="85" width="330" height="115" rx="12" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5"/>
  <rect x="390" y="85" width="330" height="6" rx="3" fill="#ea580c"/>
  <circle cx="420" cy="120" r="18" fill="#fff7ed"/>
  <text x="420" y="126" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#ea580c">2</text>
  <text x="450" y="118" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0f172a">Intent Understanding</text>
  <text x="450" y="136" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Knows "gift for runner" means running gear</text>
  <rect x="450" y="152" width="60" height="20" rx="4" fill="#fee2e2"/>
  <text x="480" y="166" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#991b1b">Hard</text>
  <text x="518" y="166" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Requires AI / NLP</text>
  <!-- Card 3: Typo Tolerance -->
  <rect x="740" y="85" width="330" height="115" rx="12" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5"/>
  <rect x="740" y="85" width="330" height="6" rx="3" fill="#ea580c"/>
  <circle cx="770" cy="120" r="18" fill="#fff7ed"/>
  <text x="770" y="126" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#ea580c">3</text>
  <text x="800" y="118" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0f172a">Typo Tolerance</text>
  <text x="800" y="136" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">"iphne case" still finds iPhone cases</text>
  <rect x="800" y="152" width="60" height="20" rx="4" fill="#dcfce7"/>
  <text x="830" y="166" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#166534">Easy</text>
  <text x="868" y="166" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Most search tools support</text>
  <!-- Row 2 -->
  <!-- Card 4: Personalization -->
  <rect x="40" y="220" width="330" height="115" rx="12" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5"/>
  <rect x="40" y="220" width="330" height="6" rx="3" fill="#f97316"/>
  <circle cx="70" cy="255" r="18" fill="#fff7ed"/>
  <text x="70" y="261" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#ea580c">4</text>
  <text x="100" y="253" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0f172a">Personalization</text>
  <text x="100" y="271" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Results adapt to browsing history</text>
  <rect x="100" y="287" width="60" height="20" rx="4" fill="#fee2e2"/>
  <text x="130" y="301" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#991b1b">Hard</text>
  <text x="168" y="301" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Needs data + ML pipeline</text>
  <!-- Card 5: Did You Mean -->
  <rect x="390" y="220" width="330" height="115" rx="12" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5"/>
  <rect x="390" y="220" width="330" height="6" rx="3" fill="#f97316"/>
  <circle cx="420" cy="255" r="18" fill="#fff7ed"/>
  <text x="420" y="261" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#ea580c">5</text>
  <text x="450" y="253" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0f172a">"Did You Mean" Suggestions</text>
  <text x="450" y="271" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Smart corrections without dead ends</text>
  <rect x="450" y="287" width="60" height="20" rx="4" fill="#fef3c7"/>
  <text x="480" y="301" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">Medium</text>
  <text x="518" y="301" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Search analytics + rules</text>
  <!-- Card 6: Visual Results -->
  <rect x="740" y="220" width="330" height="115" rx="12" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5"/>
  <rect x="740" y="220" width="330" height="6" rx="3" fill="#f97316"/>
  <circle cx="770" cy="255" r="18" fill="#fff7ed"/>
  <text x="770" y="261" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#ea580c">6</text>
  <text x="800" y="253" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0f172a">Visual Results</text>
  <text x="800" y="271" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Images, prices, ratings in results</text>
  <rect x="800" y="287" width="60" height="20" rx="4" fill="#dcfce7"/>
  <text x="830" y="301" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#166534">Easy</text>
  <text x="868" y="301" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Frontend/template work</text>
  <!-- Row 3 (centered) -->
  <!-- Card 7: Related Products -->
  <rect x="390" y="355" width="330" height="115" rx="12" fill="#ffffff" stroke="#ea580c" stroke-width="2"/>
  <rect x="390" y="355" width="330" height="6" rx="3" fill="#dc2626"/>
  <circle cx="420" cy="390" r="18" fill="#fff7ed"/>
  <text x="420" y="396" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#ea580c">7</text>
  <text x="450" y="388" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0f172a">Related Products</text>
  <text x="450" y="406" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Contextual recommendations in results</text>
  <rect x="450" y="422" width="60" height="20" rx="4" fill="#fef3c7"/>
  <text x="480" y="436" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">Medium</text>
  <text x="518" y="436" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Recs engine or AI</text>
  <!-- Legend -->
  <rect x="780" y="370" width="12" height="12" rx="2" fill="#dcfce7"/>
  <text x="798" y="381" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Easy - any store</text>
  <rect x="780" y="392" width="12" height="12" rx="2" fill="#fef3c7"/>
  <text x="798" y="403" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Medium - some effort</text>
  <rect x="780" y="414" width="12" height="12" rx="2" fill="#fee2e2"/>
  <text x="798" y="425" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Hard - requires AI</text>
</svg>