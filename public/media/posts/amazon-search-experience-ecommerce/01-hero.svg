  <text x="240" y="395" font-family="system-ui, sans-serif" font-size="9" fill="#16a34a">Best for flat feet</text>
  <text x="240" y="413" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">FREE delivery Thu</text>
  <rect x="420" y="215" width="175" height="220" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="435" y="225" width="145" height="100" rx="4" fill="#f1f5f9"/>
