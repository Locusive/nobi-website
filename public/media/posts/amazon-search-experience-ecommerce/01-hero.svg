<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="1200" height="500" fill="#ffffff"/>
  <text x="600" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="#0f172a">Deconstructing Amazon's Search Experience</text>
  <text x="600" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">7 features that set the standard for ecommerce search</text>
  <!-- Central search bar -->
  <rect x="300" y="110" width="600" height="56" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="3"/>
  <text x="330" y="144" font-family="system-ui, sans-serif" font-size="16" fill="#6b7280">running shoes for flat fee...</text>
  <rect x="830" y="114" width="66" height="48" rx="6" fill="#ea580c"/>
  <text x="863" y="144" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#ffffff">&#x1F50D;</text>
  <!-- Feature callouts radiating from search bar -->
  <!-- Top left: Synonym Handling -->
  <line x1="370" y1="110" x2="160" y2="50" stroke="#fdba74" stroke-width="2"/>
  <circle cx="160" cy="50" r="6" fill="#ea580c"/>
  <rect x="40" y="30" width="200" height="55" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="140" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#c2410c">Synonym Handling</text>
  <text x="140" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ea580c">"sneakers" = "running shoes"</text>
  <!-- Top right: Intent Understanding -->
  <line x1="830" y1="110" x2="1040" y2="50" stroke="#fdba74" stroke-width="2"/>
  <circle cx="1040" cy="50" r="6" fill="#ea580c"/>
  <rect x="940" y="30" width="200" height="55" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="1040" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#c2410c">Intent Understanding</text>
  <text x="1040" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ea580c">Knows what you mean, not just say</text>
  <!-- Left: Typo Tolerance -->
  <line x1="300" y1="138" x2="120" y2="190" stroke="#fdba74" stroke-width="2"/>
  <circle cx="120" cy="190" r="6" fill="#ea580c"/>
  <rect x="20" y="170" width="200" height="55" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="120" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#c2410c">Typo Tolerance</text>
  <text x="120" y="208" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ea580c">"iphne" → "iPhone" results</text>
  <!-- Right: Personalization -->
  <line x1="900" y1="138" x2="1080" y2="190" stroke="#fdba74" stroke-width="2"/>
  <circle cx="1080" cy="190" r="6" fill="#ea580c"/>
  <rect x="980" y="170" width="200" height="55" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="1080" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#c2410c">Personalization</text>
  <text x="1080" y="208" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ea580c">Results shaped by your history</text>
  <!-- Bottom area: Results grid -->
  <rect x="200" y="195" width="800" height="270" rx="12" fill="#fafafa" stroke="#e5e7eb" stroke-width="1.5"/>
