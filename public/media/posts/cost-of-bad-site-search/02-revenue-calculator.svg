<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="1200" height="500" fill="#f8fafc"/>

  <text x="600" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Search Revenue Impact Calculator</text>
  <text x="600" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Plug in your numbers to see what bad search costs you</text>

  <!-- Input section -->
  <rect x="60" y="85" width="500" height="390" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="60" y="85" width="500" height="45" rx="16" fill="#dc2626"/>
  <text x="310" y="114" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">YOUR INPUTS</text>

  <!-- Input fields -->
  <text x="90" y="165" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Monthly site visitors</text>
  <rect x="360" y="148" width="170" height="32" rx="6" fill="#f8fafc" stroke="#d1d5db" stroke-width="1"/>
  <text x="520" y="170" text-anchor="end" font-family="system-ui, sans-serif" font-size="14" fill="#1e293b">100,000</text>

  <text x="90" y="215" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">% who use search</text>
  <rect x="360" y="198" width="170" height="32" rx="6" fill="#f8fafc" stroke="#d1d5db" stroke-width="1"/>
  <text x="520" y="220" text-anchor="end" font-family="system-ui, sans-serif" font-size="14" fill="#1e293b">15%</text>

  <text x="90" y="265" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Search failure rate</text>
  <rect x="360" y="248" width="170" height="32" rx="6" fill="#f8fafc" stroke="#d1d5db" stroke-width="1"/>
  <text x="520" y="270" text-anchor="end" font-family="system-ui, sans-serif" font-size="14" fill="#dc2626">30%</text>

  <text x="90" y="315" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Average order value</text>
  <rect x="360" y="298" width="170" height="32" rx="6" fill="#f8fafc" stroke="#d1d5db" stroke-width="1"/>
  <text x="520" y="320" text-anchor="end" font-family="system-ui, sans-serif" font-size="14" fill="#1e293b">$85</text>

  <text x="90" y="365" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Search conversion rate</text>
  <rect x="360" y="348" width="170" height="32" rx="6" fill="#f8fafc" stroke="#d1d5db" stroke-width="1"/>
  <text x="520" y="370" text-anchor="end" font-family="system-ui, sans-serif" font-size="14" fill="#1e293b">4.5%</text>

  <text x="90" y="415" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">% who leave after bad search</text>
  <rect x="360" y="398" width="170" height="32" rx="6" fill="#f8fafc" stroke="#d1d5db" stroke-width="1"/>
  <text x="520" y="420" text-anchor="end" font-family="system-ui, sans-serif" font-size="14" fill="#dc2626">80%</text>

  <!-- Calculation arrow -->
  <path d="M580 285 L630 285" stroke="#dc2626" stroke-width="3" fill="none" marker-end="url(#calcArrow)"/>
  <defs><marker id="calcArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker></defs>

  <!-- Output section -->
  <rect x="640" y="85" width="520" height="390" rx="16" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <rect x="640" y="85" width="520" height="45" rx="16" fill="#991b1b"/>
  <text x="900" y="114" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">WHAT BAD SEARCH COSTS YOU</text>

  <!-- Output calculations -->
  <text x="670" y="165" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Monthly search users</text>
  <text x="1130" y="165" text-anchor="end" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#1e293b">15,000</text>
  <line x1="670" y1="178" x2="1130" y2="178" stroke="#f1f5f9" stroke-width="1"/>

  <text x="670" y="205" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Failed searches per month</text>
  <text x="1130" y="205" text-anchor="end" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#dc2626">4,500</text>
  <line x1="670" y1="218" x2="1130" y2="218" stroke="#f1f5f9" stroke-width="1"/>

  <text x="670" y="245" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Shoppers lost from bad search</text>
  <text x="1130" y="245" text-anchor="end" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#dc2626">3,600</text>
  <line x1="670" y1="258" x2="1130" y2="258" stroke="#f1f5f9" stroke-width="1"/>

  <text x="670" y="285" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Potential conversions lost</text>
  <text x="1130" y="285" text-anchor="end" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#dc2626">162</text>
  <line x1="670" y1="298" x2="1130" y2="298" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Monthly loss -->
  <rect x="670" y="310" width="460" height="55" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="690" y="335" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#991b1b">Monthly revenue lost</text>
  <text x="1110" y="340" text-anchor="end" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="#dc2626">$13,770</text>
  <text x="690" y="355" font-family="system-ui, sans-serif" font-size="11" fill="#b91c1c">162 lost orders x $85 AOV</text>

  <!-- Annual loss -->
  <rect x="670" y="375" width="460" height="65" rx="10" fill="#991b1b"/>
  <text x="690" y="405" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#fecaca">Annual revenue lost</text>
  <text x="1110" y="410" text-anchor="end" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="#ffffff">$165,240</text>
  <text x="690" y="430" font-family="system-ui, sans-serif" font-size="12" fill="#fca5a5">That's just the direct cost. LTV impact adds 2-3x more.</text>

  <!-- Bottom note -->
  <text x="600" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Based on industry averages. Your actual numbers may vary. Run your own calculation at nobi.ai</text>
</svg>