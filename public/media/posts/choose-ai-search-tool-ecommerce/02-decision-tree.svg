<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="1200" height="500" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Which AI Search Tier Is Right for You?</text>

  <!-- Start node -->
  <rect x="460" y="50" width="280" height="50" rx="25" fill="#16a34a" stroke="#15803d" stroke-width="2"/>
  <text x="600" y="81" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">How big is your catalog?</text>

  <!-- Arrow down left -->
  <line x1="520" y1="100" x2="260" y2="150" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="370" y="118" text-anchor="middle" font-size="12" fill="#64748b" font-weight="600">&lt; 5K SKUs</text>

  <!-- Arrow down right -->
  <line x1="680" y1="100" x2="920" y2="150" stroke="#94a3b8" stroke-width="2"/>
  <text x="820" y="118" text-anchor="middle" font-size="12" fill="#64748b" font-weight="600">5K+ SKUs</text>

  <!-- Left branch: Small catalog -->
  <rect x="120" y="150" width="280" height="50" rx="25" fill="#22c55e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="260" y="181" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Monthly budget?</text>

  <!-- Left-left: Under $500 -->
  <line x1="190" y1="200" x2="120" y2="250" stroke="#94a3b8" stroke-width="2"/>
  <text x="130" y="230" text-anchor="middle" font-size="11" fill="#64748b" font-weight="600">&lt; $500/mo</text>
  <rect x="20" y="250" width="200" height="70" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="120" y="278" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Starter Tier</text>
  <text x="120" y="298" text-anchor="middle" font-size="11" fill="#64748b">Nobi, Doofinder, or</text>
  <text x="120" y="312" text-anchor="middle" font-size="11" fill="#64748b">basic Searchspring</text>

  <!-- Left-right: $500-2K -->
  <line x1="330" y1="200" x2="380" y2="250" stroke="#94a3b8" stroke-width="2"/>
  <text x="380" y="230" text-anchor="middle" font-size="11" fill="#64748b" font-weight="600">$500-2K/mo</text>

  <!-- Do you have devs? -->
  <rect x="280" y="250" width="240" height="50" rx="25" fill="#22c55e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="400" y="281" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Have dev resources?</text>

  <line x1="340" y1="300" x2="280" y2="350" stroke="#94a3b8" stroke-width="2"/>
  <text x="290" y="330" text-anchor="middle" font-size="11" fill="#64748b" font-weight="600">No</text>
  <rect x="170" y="350" width="200" height="70" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="270" y="378" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">No-Code Mid Tier</text>
  <text x="270" y="398" text-anchor="middle" font-size="11" fill="#64748b">Nobi, Klevu, or</text>
  <text x="270" y="412" text-anchor="middle" font-size="11" fill="#64748b">Searchspring</text>

  <line x1="460" y1="300" x2="510" y2="350" stroke="#94a3b8" stroke-width="2"/>
  <text x="510" y="330" text-anchor="middle" font-size="11" fill="#64748b" font-weight="600">Yes</text>
  <rect x="420" y="350" width="200" height="70" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="520" y="378" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Dev-Ready Mid Tier</text>
  <text x="520" y="398" text-anchor="middle" font-size="11" fill="#64748b">Algolia or Klevu</text>

  <!-- Right branch: Large catalog -->
  <rect x="780" y="150" width="280" height="50" rx="25" fill="#22c55e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="920" y="181" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Annual budget?</text>

  <line x1="850" y1="200" x2="780" y2="250" stroke="#94a3b8" stroke-width="2"/>
  <text x="790" y="230" text-anchor="middle" font-size="11" fill="#64748b" font-weight="600">&lt; $25K/yr</text>
  <rect x="670" y="250" width="220" height="70" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="780" y="278" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Growth Tier</text>
  <text x="780" y="298" text-anchor="middle" font-size="11" fill="#64748b">Nobi, Searchspring,</text>
  <text x="780" y="312" text-anchor="middle" font-size="11" fill="#64748b">or Klevu Pro</text>

  <line x1="990" y1="200" x2="1040" y2="250" stroke="#94a3b8" stroke-width="2"/>
  <text x="1050" y="230" text-anchor="middle" font-size="11" fill="#64748b" font-weight="600">$25K+/yr</text>

  <rect x="940" y="250" width="240" height="50" rx="25" fill="#22c55e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="1060" y="281" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Need omnichannel?</text>

  <line x1="1000" y1="300" x2="940" y2="350" stroke="#94a3b8" stroke-width="2"/>
  <text x="950" y="330" text-anchor="middle" font-size="11" fill="#64748b" font-weight="600">No</text>
  <rect x="830" y="350" width="200" height="70" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="930" y="378" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Enterprise Search</text>
  <text x="930" y="398" text-anchor="middle" font-size="11" fill="#64748b">Constructor or Algolia</text>
  <text x="930" y="412" text-anchor="middle" font-size="11" fill="#64748b">Enterprise</text>

  <line x1="1120" y1="300" x2="1120" y2="350" stroke="#94a3b8" stroke-width="2"/>
  <text x="1145" y="330" text-anchor="middle" font-size="11" fill="#64748b" font-weight="600">Yes</text>
  <rect x="1040" y="350" width="200" height="70" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="1140" y="378" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Full-Stack Enterprise</text>
  <text x="1140" y="398" text-anchor="middle" font-size="11" fill="#64748b">Bloomreach or</text>
  <text x="1140" y="412" text-anchor="middle" font-size="11" fill="#64748b">Constructor</text>

  <!-- Bottom note -->
  <rect x="350" y="450" width="500" height="40" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="600" y="475" text-anchor="middle" font-size="13" fill="#166534" font-weight="600">Nobi appears at every tier because conversational AI scales with you</text>
</svg>