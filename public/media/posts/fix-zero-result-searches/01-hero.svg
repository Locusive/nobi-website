<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="1200" height="500" fill="#f8fafc"/>

  <!-- Zero results mockup -->
  <rect x="250" y="30" width="700" height="440" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Browser bar -->
  <rect x="250" y="30" width="700" height="40" rx="16" fill="#f1f5f9"/>
  <rect x="250" y="54" width="700" height="16" fill="#f1f5f9"/>
  <circle cx="280" cy="50" r="6" fill="#fca5a5"/>
  <circle cx="300" cy="50" r="6" fill="#fde68a"/>
  <circle cx="320" cy="50" r="6" fill="#86efac"/>
  <rect x="380" y="42" width="260" height="18" rx="9" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="510" y="55" text-anchor="middle" font-size="10" fill="#94a3b8">yourstore.com/search?q=...</text>

  <!-- Search bar in page -->
  <rect x="350" y="95" width="500" height="44" rx="22" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="600" y="122" text-anchor="middle" font-size="14" fill="#475569">"waterproof hiking boots women"</text>

  <!-- Sad face -->
  <circle cx="600" cy="220" r="50" fill="#fef2f2" stroke="#fecaca" stroke-width="2"/>
  <circle cx="582" cy="208" r="5" fill="#ef4444"/>
  <circle cx="618" cy="208" r="5" fill="#ef4444"/>
  <path d="M575 238 Q600 225 625 238" stroke="#ef4444" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Zero results text -->
  <text x="600" y="305" text-anchor="middle" font-size="22" font-weight="700" fill="#dc2626">No results found</text>
  <text x="600" y="330" text-anchor="middle" font-size="14" fill="#64748b">We couldn't find any products matching your search.</text>
  <text x="600" y="352" text-anchor="middle" font-size="14" fill="#64748b">Try different keywords or browse our categories.</text>

  <!-- Stats at bottom -->
  <rect x="310" y="385" width="170" height="65" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="395" y="410" text-anchor="middle" font-size="24" font-weight="700" fill="#dc2626">80%</text>
  <text x="395" y="432" text-anchor="middle" font-size="11" fill="#64748b">leave after seeing this</text>

  <rect x="515" y="385" width="170" height="65" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="600" y="410" text-anchor="middle" font-size="24" font-weight="700" fill="#dc2626">$300B</text>
  <text x="600" y="432" text-anchor="middle" font-size="11" fill="#64748b">lost annually from bad search</text>

  <rect x="720" y="385" width="170" height="65" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="805" y="410" text-anchor="middle" font-size="24" font-weight="700" fill="#dc2626">82%</text>
  <text x="805" y="432" text-anchor="middle" font-size="11" fill="#64748b">won't come back</text>
</svg>