<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="1200" height="500" fill="#ffffff"/>

  <text x="600" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">How an AI Shopping Assistant Works</text>
  <text x="600" y="75" text-anchor="middle" font-size="14" fill="#64748b">Four steps from natural language query to personalized results</text>

  <!-- Step 1 -->
  <rect x="40" y="110" width="250" height="300" rx="16" fill="#f8fafc" stroke="#c7d2fe" stroke-width="2"/>
  <circle cx="165" cy="150" r="24" fill="#4f46e5"/>
  <text x="165" y="157" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">1</text>
  <text x="165" y="200" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Shopper Asks</text>
  <text x="165" y="225" text-anchor="middle" font-size="13" fill="#64748b">Natural language input</text>
  <rect x="65" y="250" width="200" height="40" rx="20" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="165" y="275" text-anchor="middle" font-size="12" fill="#4338ca">"warm jacket for hiking"</text>
  <rect x="65" y="300" width="200" height="40" rx="20" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="165" y="325" text-anchor="middle" font-size="12" fill="#4338ca">"gift for a 5 year old"</text>
  <rect x="65" y="350" width="200" height="40" rx="20" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="165" y="375" text-anchor="middle" font-size="12" fill="#4338ca">"office chair bad back"</text>

  <!-- Arrow 1→2 -->
  <path d="M300 260 L330 260" stroke="#4f46e5" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f46e5"/>
    </marker>
  </defs>

  <!-- Step 2 -->
  <rect x="340" y="110" width="250" height="300" rx="16" fill="#f8fafc" stroke="#a5b4fc" stroke-width="2"/>
  <circle cx="465" cy="150" r="24" fill="#4f46e5"/>
  <text x="465" y="157" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">2</text>
  <text x="465" y="200" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">AI Interprets</text>
  <text x="465" y="225" text-anchor="middle" font-size="13" fill="#64748b">Understands intent</text>

  <rect x="365" y="250" width="200" height="30" rx="6" fill="#dbeafe"/>
  <text x="465" y="270" text-anchor="middle" font-size="12" fill="#1e40af">Category: Outerwear</text>
  <rect x="365" y="290" width="200" height="30" rx="6" fill="#dbeafe"/>
  <text x="465" y="310" text-anchor="middle" font-size="12" fill="#1e40af">Attribute: Insulated</text>
  <rect x="365" y="330" width="200" height="30" rx="6" fill="#dbeafe"/>
  <text x="465" y="350" text-anchor="middle" font-size="12" fill="#1e40af">Use Case: Outdoor/Active</text>
  <rect x="365" y="370" width="200" height="30" rx="6" fill="#dbeafe"/>
  <text x="465" y="390" text-anchor="middle" font-size="12" fill="#1e40af">Season: Cold Weather</text>

  <!-- Arrow 2→3 -->
  <path d="M600 260 L630 260" stroke="#4f46e5" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- Step 3 -->
  <rect x="640" y="110" width="250" height="300" rx="16" fill="#f8fafc" stroke="#818cf8" stroke-width="2"/>
  <circle cx="765" cy="150" r="24" fill="#4f46e5"/>
  <text x="765" y="157" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">3</text>
  <text x="765" y="200" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Catalog Match</text>
  <text x="765" y="225" text-anchor="middle" font-size="13" fill="#64748b">Semantic product search</text>

  <rect x="665" y="250" width="200" height="60" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="765" y="275" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">Patagonia Down Jacket</text>
  <text x="765" y="295" text-anchor="middle" font-size="11" fill="#22c55e">Score: 0.97</text>

  <rect x="665" y="320" width="200" height="60" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="765" y="345" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">Arc'teryx Shell</text>
  <text x="765" y="365" text-anchor="middle" font-size="11" fill="#22c55e">Score: 0.94</text>

  <!-- Arrow 3→4 -->
  <path d="M900 260 L930 260" stroke="#4f46e5" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- Step 4 -->
  <rect x="940" y="110" width="230" height="300" rx="16" fill="#f8fafc" stroke="#6366f1" stroke-width="2"/>
  <circle cx="1055" cy="150" r="24" fill="#4f46e5"/>
  <text x="1055" y="157" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">4</text>
  <text x="1055" y="200" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Results Served</text>
  <text x="1055" y="225" text-anchor="middle" font-size="13" fill="#64748b">Ranked, relevant products</text>

  <rect x="965" y="250" width="180" height="150" rx="12" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="1055" y="290" text-anchor="middle" font-size="32">&#127993;</text>
  <text x="1055" y="325" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Perfect Match</text>
  <text x="1055" y="345" text-anchor="middle" font-size="12" fill="#64748b">Instant. Relevant.</text>
  <text x="1055" y="365" text-anchor="middle" font-size="12" fill="#64748b">Personalized.</text>
  <text x="1055" y="385" text-anchor="middle" font-size="12" font-weight="600" fill="#22c55e">+2.4x conversion</text>

  <!-- Bottom bar -->
  <rect x="40" y="440" width="1120" height="40" rx="8" fill="#eef2ff"/>
  <text x="600" y="465" text-anchor="middle" font-size="14" font-weight="600" fill="#4338ca">Under 200ms end-to-end  |  No manual synonym mapping  |  Works from day one</text>
</svg>