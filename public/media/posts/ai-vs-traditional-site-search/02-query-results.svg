<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="1200" height="500" fill="#ffffff"/>

  <text x="600" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Same Query, Different Results</text>

  <!-- Query bar -->
  <rect x="300" y="55" width="600" height="44" rx="22" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="600" y="82" text-anchor="middle" font-size="15" fill="#475569">"birthday gift for a 10 year old who likes science"</text>

  <!-- Left: Traditional -->
  <rect x="40" y="120" width="540" height="360" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="40" y="120" width="540" height="44" rx="16" fill="#f1f5f9"/>
  <rect x="40" y="148" width="540" height="16" fill="#f1f5f9"/>
  <text x="310" y="148" text-anchor="middle" font-size="15" font-weight="700" fill="#64748b">Traditional Keyword Search</text>

  <rect x="70" y="180" width="480" height="55" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="90" y="203" font-size="13" font-weight="600" fill="#1e293b">Birthday Party Plates — Science Theme</text>
  <text x="90" y="222" font-size="11" fill="#dc2626">Matched "birthday" + "science" -- party supplies, not a gift</text>

  <rect x="70" y="245" width="480" height="55" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="90" y="268" font-size="13" font-weight="600" fill="#1e293b">Science Lab Notebook — College Ruled</text>
  <text x="90" y="287" font-size="11" fill="#dc2626">Matched "science" -- not a gift, not age-appropriate</text>

  <rect x="70" y="310" width="480" height="55" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="90" y="333" font-size="13" font-weight="600" fill="#1e293b">Gift Card — $10 Denomination</text>
  <text x="90" y="352" font-size="11" fill="#ea580c">Matched "gift" + "10" -- completely missed the intent</text>

  <rect x="70" y="375" width="480" height="55" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="90" y="398" font-size="13" font-weight="600" fill="#1e293b">Science Textbook — Grade 10</text>
  <text x="90" y="417" font-size="11" fill="#dc2626">Matched "science" + "10" -- wrong age, wrong product</text>

  <!-- Verdict -->
  <rect x="70" y="440" width="480" height="28" rx="6" fill="#fef2f2"/>
  <text x="310" y="459" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">0 out of 4 results are actually relevant</text>

  <!-- Right: AI -->
  <rect x="620" y="120" width="540" height="360" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="620" y="120" width="540" height="44" rx="16" fill="#eff6ff"/>
  <rect x="620" y="148" width="540" height="16" fill="#eff6ff"/>
  <text x="890" y="148" text-anchor="middle" font-size="15" font-weight="700" fill="#2563eb">AI Shopping Assistant</text>

  <rect x="650" y="180" width="480" height="55" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="670" y="203" font-size="13" font-weight="600" fill="#1e293b">Kids Chemistry Lab Kit — Ages 8-12</text>
  <text x="670" y="222" font-size="11" fill="#16a34a">Science toy, gift-appropriate, correct age range</text>

  <rect x="650" y="245" width="480" height="55" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="670" y="268" font-size="13" font-weight="600" fill="#1e293b">National Geographic Rock Tumbler Kit</text>
  <text x="670" y="287" font-size="11" fill="#16a34a">Science/geology, popular gift, ages 8+</text>

  <rect x="650" y="310" width="480" height="55" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="670" y="333" font-size="13" font-weight="600" fill="#1e293b">Snap Circuits Jr. Electronics Kit</text>
  <text x="670" y="352" font-size="11" fill="#16a34a">STEM toy, highly giftable, ages 8-12</text>

  <rect x="650" y="375" width="480" height="55" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="670" y="398" font-size="13" font-weight="600" fill="#1e293b">Telescope for Kids — Beginner Astronomy Set</text>
  <text x="670" y="417" font-size="11" fill="#16a34a">Science interest, excellent gift, age-appropriate</text>

  <!-- Verdict -->
  <rect x="650" y="440" width="480" height="28" rx="6" fill="#f0fdf4"/>
  <text x="890" y="459" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">4 out of 4 results match the shopper's actual intent</text>
</svg>